# HTTPS block for garant-master-ekb.ru
# Apply AFTER certbot. Fixes TSPU issues for many RU users:
# - HTTP/2 (one TLS connection for all assets — CSS/JS load together)
# - TLS 1.2 only (TLS 1.3 fingerprint often triggers false blocks)
#
# On VPS:
#   sudo nano /etc/nginx/sites-available/garant-master.conf
#   Merge this server { } block with your certbot paths, then:
#   sudo nginx -t && sudo systemctl reload nginx

upstream garant_master_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name garant-master-ekb.ru www.garant-master-ekb.ru;

    # Paths from certbot — verify on server: ls /etc/letsencrypt/live/garant-master-ekb.ru/
    ssl_certificate     /etc/letsencrypt/live/garant-master-ekb.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/garant-master-ekb.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;

    # Override certbot defaults for TSPU compatibility
    ssl_protocols TLSv1.2;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    location /_next/static/ {
        proxy_pass http://garant_master_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://garant_master_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name garant-master-ekb.ru www.garant-master-ekb.ru;
    return 301 https://$host$request_uri;
}
